[web]
host = 0.0.0.0
port = 8080
# Enable TLS in production: set ssl = true and point ssl_cert/ssl_key at a
# valid certificate + key. The API enforces X-API-Key auth, but without TLS
# keys travel in plaintext.
ssl = false
ssl_cert =
ssl_key =
# Serve the web console + live-stats WebSocket from THIS process. Set false on
# fleet WORKER boxes so they run headless (REST API + loop engine only) and the
# single controller GUI is the one pane of glass — saves idle CPU/RAM. Same as
# launching with --headless.
serve_console = true

[fleet]
# Multi-box control plane over the VLAN (opt-in). Communication is plain REST:
# the controller calls each worker's :PORT API with X-API-Key. A worker can also
# BROADCAST a UDP beacon so the controller auto-registers it (no hand-copying).
#
#   announce   - worker: broadcast a discovery beacon on the VLAN (default off)
#   discovery  - controller: listen for beacons and auto-register workers
#   token      - shared secret on EVERY box: it filters foreign beacons AND is
#                the api_key the controller presents to discovered workers. Pick
#                a long random string; keep it identical fleet-wide.
#   node_address - the URL a worker advertises (e.g. http://10.20.8.11:8080).
#                  Blank => derived from [web] host/port (primary IP if 0.0.0.0).
announce = false
discovery = false
token =
beacon_port = 45790
beacon_interval = 10
node_address =

[sip]
# SIP timer values (seconds)
T1 = 60
T2 = 120

# SIP-facing local bind address for the answer-side UAS (signalling + media,
# i.e. SIPp -i/-mi). Leave blank to bind all interfaces (fine for a single-homed
# box). On a multi-homed deploy set this to the MADA-facing address so the SDP
# the UAS advertises matches the interface return media arrives on.
local_ip =

# RTP port range. ALWAYS passed to SIPp (-min_rtp_port/-max_rtp_port) so media
# ports stay inside this firewalled window; keep it in sync with the host
# firewall's allowed UDP media range AND with docker-compose.v2.yml
# RTP_PORT_RANGE + the firewall rules in docs/deploy/loop-runner.md (the
# three-way "must match" set). The default below is the conservative,
# well-known window the deploy doc/compose ship: ≈200 ports ≈100 concurrent
# two-way calls, sized for the 4 vCPU / 4 GB box. Raise only after measuring.
min_rtp_port = 16384
max_rtp_port = 16584

[database]
# sqlite or postgresql (override with GENCALL_DB_ENGINE)
engine = sqlite
# SQLite path (used when engine = sqlite)
sqlite_path = /opt/gencall/etc/gencall.db
# PostgreSQL connection (used when engine = postgresql).
# Credentials are read from the environment — do NOT commit secrets here.
#   GENCALL_DATABASE_URL  full URL override (wins over everything below)
#   GENCALL_PG_HOST / GENCALL_PG_PORT / GENCALL_PG_USER /
#   GENCALL_PG_PASSWORD / GENCALL_PG_DATABASE
pg_host = 127.0.0.1
pg_port = 5432
pg_user = gencall
pg_password =
pg_database = gencall

[sipp]
# Path to SIPp binary
command = /usr/local/bin/sipp
open_file_limit = 5000
# Default transport: udp, tcp, tls
default_transport = udp
# Directory for SIPp per-instance stats CSV files. Default /tmp keeps existing
# Linux behavior; set to a writable path on non-POSIX hosts (e.g. Windows) or
# to keep stats off /tmp. Falls back to the platform temp dir if missing.
stats_dir = /tmp

[logging]
# 10=DEBUG, 20=INFO, 30=WARNING, 40=ERROR
level = 20
file = /opt/gencall/logs/gencall.log
max_bytes = 10485760
backup_count = 5

[media]
# Directory for audio files (g711a, g711u, g729, pcap)
path = /opt/gencall/media

[stats]
# Stats collection interval in seconds
interval = 5
# How many stats records to keep in memory
history_size = 1000

[loops]
# LoopEngine caps (design §4.1). Sized for the 2-core / 4 GB worker after
# measuring: ~0.85 MB + a sliver of a core per concurrent call with RTP echo,
# so ~1000 concurrent is the realistic ceiling. Raise on bigger boxes.
# Max concurrently running Loop Campaigns (each ≈ 2 channels).
max_concurrent_loops = 50
# Per-campaign UAC outbound concurrent cap (the "max_concurrent" guardrail).
max_channels = 1000
# Max simultaneously-answered inbound calls on the persistent UAS (its SIPp -l).
# Keep this >= max_channels, else a high-concurrency UAC outruns the answer side
# and calls past this never get answered/matched.
max_answered_calls = 1100
# Hard ceiling on a single answered call (seconds); the UAS BYEs anything that
# runs past it so a wedged dialog can never pin a channel.
answered_max_duration_s = 7200
# Floor between UAS restart attempts (seconds) — throttled backoff so a crash
# loop never busy-restarts the answer side.
uas_restart_backoff_s = 5
# Adaptive number pool: learn which destination prefixes route from call_records
# and rebuild the pool toward them to cut 404 "no route". A monitor scores each
# running campaign's prefixes every adaptive_interval_s, drops those whose ASR is
# below adaptive_min_asr (once they have adaptive_min_attempts calls), rebuilds
# the pool from the routable prefixes, and restarts that loop's UAC to load it
# (brief blip per rebuild, only when the routable set changes). ON by default;
# set adaptive_pool = false to disable.
adaptive_pool = true
adaptive_interval_s = 300
adaptive_min_attempts = 30
adaptive_min_asr = 0.3
adaptive_prefix_len = 6
# Score only the most-recent N calls per campaign (0 = all-time) so decisions
# track current routability rather than being dragged by pre-convergence history.
adaptive_window = 1000
# Write SIPp's -trace_err error file. Off by default: on a busy loop it balloons
# to 100s of MB of retransmit noise and is rarely read. Turn on only to debug.
sipp_trace_err = false
# Force-finalize a call record that never logged a BYE after this many seconds,
# so the call-record tail-parser's in-memory accumulator can't leak. When the
# switch tears a call down at a media timeout (signaling-only loops), the UAC
# never logs t_bye_sent, so the answered record would otherwise linger forever
# (observed: a worker's parser grew to ~1.26 GB RSS). Set comfortably above your
# longest ACD; default 1800 s (30 min). 0 disables the sweep.
record_max_age_s = 1800

[trust]
# Inbound SIP source whitelist (design §4.1 trust filter). The REAL trust
# boundary is the HOST FIREWALL — the deploy docs (docs/deploy/loop-runner.md)
# ship nftables AND ufw rules restricting UDP/5060 + the RTP range to exactly
# these IPs/CIDRs (MADA switch, plus any extras). The app layer is
# verification-only: every inbound call_record is tagged with its source_ip and
# anything outside this list is flagged/dropped, so a misconfigured firewall is
# visible rather than silently trusted. Comma- or space-separated. Empty by
# default on purpose — set it to MADA's signalling IP(s) at deploy time. Keep
# this list and the firewall rule set in sync.
whitelist =

[retention]
# call_records retention (design §5, §7 stage 10). call_records is the growth
# table — a busy loop box writes ~400k rows/day, so a long window grows the
# SQLite DB to GBs and fills small disks. Delete records older than this many
# days (0 disables pruning). Default 1 — billing owns the authoritative records,
# so this table is just live diagnostics; raise only on a dedicated archive box.
call_records_days = 1
# Minimum HOURS between two actual prunes — the INTERVAL GATE. The prune runs at
# most once per this window and the gate timestamp is persisted (survives
# restarts), so we never recreate the old sigma per-iteration DELETE storm.
interval_hours = 24
