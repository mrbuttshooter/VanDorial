name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: OpenAPI schemas are current
        # docs/api/*.json feed frontend type generation (npm run generate:api);
        # fail if the checked-in schema drifted from the API code.
        run: |
          python -m gencall.scripts.export_openapi --role worker --check docs/api/openapi.worker.json
          python -m gencall.scripts.export_openapi --role controller --check docs/api/openapi.controller.json

      - name: Run GenCall test suite
        run: python tests/test_gencall.py

      - name: Run pytest
        # Exit code 5 means "no tests collected" — don't treat that as a failure.
        run: |
          code=0
          python -m pytest -q || code=$?
          if [ "$code" -eq 5 ]; then
            echo "pytest collected no tests; treating as success."
            exit 0
          fi
          exit $code

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
